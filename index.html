<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte Generativa - Rede Neural</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a12; /* Fundo azul bem escuro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto; /* Permite interagir com o painel */
        }

        #ui-panel h1 {
            font-size: 18px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4df3ff; /* Ciano Neon */
        }

        #ui-panel p {
            font-size: 12px;
            margin: 0 0 15px 0;
            opacity: 0.8;
        }

        .control-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        button#btn-random {
            background-color: #4df3ff;
            color: #0a0a12;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        button#btn-random:hover {
            background-color: white;
            box-shadow: 0 0 10px rgba(77, 243, 255, 0.7);
        }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>

    <div id="ui-panel">
        <h1>Rede Neural</h1>
        <p>Arte generativa interativa. Mova o mouse.</p>

        <div class="control-group">
            <label for="particle-count">Quantidade de Pontos: <span id="count-val"></span></label>
            <input type="range" id="particle-count" min="50" max="400" step="10" value="150">
        </div>

        <div class="control-group">
            <label for="connection-dist">Distância de Conexão</label>
            <input type="range" id="connection-dist" min="50" max="250" step="10" value="150">
        </div>

        <button id="btn-random">Cores Aleatórias</button>
    </div>

    <script>
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        const uiPanel = document.getElementById('ui-panel');
        const particleCountInput = document.getElementById('particle-count');
        const connectionDistInput = document.getElementById('connection-dist');
        const countValSpan = document.getElementById('count-val');
        const btnRandom = document.getElementById('btn-random');

        // Configurações
        let width, height;
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };
        let particleCount = parseInt(particleCountInput.value);
        let connectionDist = parseInt(connectionDistInput.value);
        let colors = [
            { r: 77, g: 243, b: 255 }, // Ciano Neon
            { r: 255, g: 0, b: 255 },  // Magenta Neon
            { r: 255, g: 255, b: 255 } // Branco
        ];
        let currentColorIndex = 0;

        // Atualiza UI
        countValSpan.innerText = particleCount;

        // Redimensionar Canvas
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        // Classe da Partícula (o Ponto)
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1; // Tamanho entre 1 e 3
                this.vx = (Math.random() - 0.5) * 1.5; // Velocidade X
                this.vy = (Math.random() - 0.5) * 1.5; // Velocidade Y
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random() * 0.5 + 0.3; // Opacidade base
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.fill();
            }

            update() {
                // Movimento básico
                this.x += this.vx;
                this.y += this.vy;

                // Rebater nas bordas
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                // Interação com o Mouse
                if (mouse.x !== null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < mouse.radius) {
                        // Força de atração suave
                        let force = (mouse.radius - dist) / mouse.radius;
                        let angle = Math.atan2(dy, dx);
                        let moveX = Math.cos(angle) * force * 2;
                        let moveY = Math.sin(angle) * force * 2;

                        this.x += moveX;
                        this.y += moveY;
                        this.alpha = Math.min(1, this.alpha + 0.05); // Brilha mais perto
                    } else {
                        // Retorna à opacidade normal
                        if (this.alpha > 0.4) this.alpha -= 0.01;
                    }
                }
            }
        }

        // Inicializar Partículas
        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // Desenhar Linhas (Conexões)
        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < connectionDist) {
                        // A opacidade da linha depende da distância
                        let alpha = 1 - (dist / connectionDist);
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        
                        // Cor da linha baseada no primeiro ponto
                        let c = particles[i].color;
                        ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha * 0.3})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        // Loop de Animação
        function animate() {
            // Limpa o canvas com um leve rastro (efeito de ghosting)
            ctx.fillStyle = 'rgba(10, 10, 18, 0.2)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            drawLines();

            requestAnimationFrame(animate);
        }

        // Eventos
        window.addEventListener('resize', resizeCanvas);

        window.addEventListener('mousemove', (e) => {
            // Verifica se o mouse está sobre o painel para não atrapalhar
            let rect = uiPanel.getBoundingClientRect();
            if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
                mouse.x = null;
                mouse.y = null;
            } else {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Controles da UI
        particleCountInput.addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            countValSpan.innerText = particleCount;
            initParticles();
        });

        connectionDistInput.addEventListener('input', (e) => {
            connectionDist = parseInt(e.target.value);
        });

        btnRandom.addEventListener('click', () => {
            // Gera um novo set de cores neon
            function getNeon() {
                return {
                    r: Math.floor(Math.random() * 155) + 100,
                    g: Math.floor(Math.random() * 155) + 100,
                    b: Math.floor(Math.random() * 155) + 100
                };
            }
            colors = [getNeon(), getNeon(), {r:255,g:255,b:255}];
            initParticles(); // Reinicia para aplicar as cores
        });

        // Início
        resizeCanvas();
        animate();

    </script>
</body>
</html>
